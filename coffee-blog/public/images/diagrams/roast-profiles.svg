<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&amp;display=swap');
      .title { font-family: 'Noto Sans JP', sans-serif; font-size: 24px; font-weight: 700; fill: #1a1a1a; }
      .subtitle { font-family: 'Noto Sans JP', sans-serif; font-size: 14px; fill: #666; }
      .roast-title { font-family: 'Noto Sans JP', sans-serif; font-size: 18px; font-weight: 700; }
      .label { font-family: 'Noto Sans JP', sans-serif; font-size: 12px; fill: #555; }
      .flavor-text { font-family: 'Noto Sans JP', sans-serif; font-size: 11px; fill: #666; }
    </style>
    <linearGradient id="roastGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="25%" style="stop-color:#c49a6c"/>
      <stop offset="50%" style="stop-color:#8b5a3c"/>
      <stop offset="75%" style="stop-color:#5c3d2e"/>
      <stop offset="100%" style="stop-color:#2a1810"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" class="title">焙煎度によるフレーバーの変化</text>
  <text x="450" y="65" text-anchor="middle" class="subtitle">焙煎時間が長くなるほど、酸味は消え、苦味が強まります</text>

  <!-- Roast Spectrum Bar -->
  <g transform="translate(50, 100)">
    <text x="0" y="-10" class="label" font-weight="700">焙煎度スペクトル</text>
    <rect x="0" y="0" width="800" height="40" fill="url(#roastGradient)" rx="4"/>

    <!-- Markers -->
    <line x1="0" y1="40" x2="0" y2="55" stroke="#666" stroke-width="2"/>
    <text x="0" y="70" text-anchor="middle" class="label">ライト</text>

    <line x1="160" y1="40" x2="160" y2="55" stroke="#666" stroke-width="2"/>
    <text x="160" y="70" text-anchor="middle" class="label">シナモン</text>

    <line x1="320" y1="40" x2="320" y2="55" stroke="#666" stroke-width="2"/>
    <text x="320" y="70" text-anchor="middle" class="label">ミディアム</text>

    <line x1="480" y1="40" x2="480" y2="55" stroke="#666" stroke-width="2"/>
    <text x="480" y="70" text-anchor="middle" class="label">ハイ</text>

    <line x1="640" y1="40" x2="640" y2="55" stroke="#666" stroke-width="2"/>
    <text x="640" y="70" text-anchor="middle" class="label">フルシティ</text>

    <line x1="800" y1="40" x2="800" y2="55" stroke="#666" stroke-width="2"/>
    <text x="800" y="70" text-anchor="middle" class="label">ダーク</text>
  </g>

  <!-- Three Main Categories -->
  <g transform="translate(50, 200)">
    <!-- Light Roast -->
    <g>
      <rect x="0" y="0" width="240" height="250" rx="8" fill="#faf5ef" stroke="#d4a574" stroke-width="2"/>
      <circle cx="120" cy="50" r="30" fill="#d4a574"/>
      <text x="120" y="55" text-anchor="middle" class="roast-title" fill="#5c3d2e">ライトロースト</text>
      <text x="120" y="100" text-anchor="middle" class="label" font-weight="700">豆の色：明るい茶色</text>

      <g transform="translate(20, 120)">
        <text x="0" y="0" class="label" font-weight="700">風味の特徴：</text>
        <text x="0" y="20" class="flavor-text">• 酸味が際立つ</text>
        <text x="0" y="38" class="flavor-text">• フルーティー</text>
        <text x="0" y="56" class="flavor-text">• 花のような香り</text>
        <text x="0" y="74" class="flavor-text">• オイルは表面に出ない</text>
      </g>

      <g transform="translate(20, 210)">
        <text x="0" y="0" class="label" font-weight="700">おすすめ豆：</text>
        <text x="0" y="18" class="flavor-text">エチオピア、ケニア</text>
      </g>
    </g>

    <!-- Medium Roast -->
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="240" height="250" rx="8" fill="#f5efe9" stroke="#8b5a3c" stroke-width="2"/>
      <circle cx="120" cy="50" r="30" fill="#8b5a3c"/>
      <text x="120" y="55" text-anchor="middle" class="roast-title" fill="#f5efe9">ミディアムロースト</text>
      <text x="120" y="100" text-anchor="middle" class="label" font-weight="700">豆の色：中間の茶色</text>

      <g transform="translate(20, 120)">
        <text x="0" y="0" class="label" font-weight="700">風味の特徴：</text>
        <text x="0" y="20" class="flavor-text">• 酸味と苦味のバランス</text>
        <text x="0" y="38" class="flavor-text">• ナッツのような甘み</text>
        <text x="0" y="56" class="flavor-text">• キャラメル感</text>
        <text x="0" y="74" class="flavor-text">• オイルが少し滲み出る</text>
      </g>

      <g transform="translate(20, 210)">
        <text x="0" y="0" class="label" font-weight="700">おすすめ豆：</text>
        <text x="0" y="18" class="flavor-text">ブラジル、グアテマラ</text>
      </g>
    </g>

    <!-- Dark Roast -->
    <g transform="translate(560, 0)">
      <rect x="0" y="0" width="240" height="250" rx="8" fill="#f0ebe5" stroke="#2a1810" stroke-width="2"/>
      <circle cx="120" cy="50" r="30" fill="#2a1810"/>
      <text x="120" y="55" text-anchor="middle" class="roast-title" fill="#f5efe9">ダークロースト</text>
      <text x="120" y="100" text-anchor="middle" class="label" font-weight="700">豆の色：濃い茶色〜黒</text>

      <g transform="translate(20, 120)">
        <text x="0" y="0" class="label" font-weight="700">風味の特徴：</text>
        <text x="0" y="20" class="flavor-text">• 苦味主体</text>
        <text x="0" y="38" class="flavor-text">• チョコレート</text>
        <text x="0" y="56" class="flavor-text">• スモーキー</text>
        <text x="0" y="74" class="flavor-text">• 表面が光る</text>
      </g>

      <g transform="translate(20, 210)">
        <text x="0" y="0" class="label" font-weight="700">おすすめ豆：</text>
        <text x="0" y="18" class="flavor-text">インドネシア、ブレンド</text>
      </g>
    </g>
  </g>

  <!-- Flavor Transition Chart -->
  <g transform="translate(50, 470)">
    <text x="0" y="0" class="label" font-weight="700">焙煎度による風味の移り変わり</text>
  </g>
</svg>