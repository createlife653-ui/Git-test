<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">AI活用度の3指標</title>
  <desc id="desc">AI文章残存率、AI工程関与率、人間独自価値率を分けて測定する考え方を示した図解。</desc>
  <defs>
    <style>
      .bg { fill: #fffdf8; }
      .title { font-family: sans-serif; font-size: 30px; font-weight: 700; fill: #251714; }
      .subtitle { font-family: sans-serif; font-size: 15px; fill: #665853; }
      .card-title { font-family: sans-serif; font-size: 20px; font-weight: 700; fill: #251714; }
      .body { font-family: sans-serif; font-size: 14px; fill: #4f4743; }
      .small { font-family: sans-serif; font-size: 12px; fill: #665853; }
      .badge { font-family: sans-serif; font-size: 13px; font-weight: 700; fill: #fffdf8; }
      .arrow { fill: none; stroke: #92786e; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .soft-line { stroke: #ded2cc; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" width="960" height="540"/>
  <text class="title" x="480" y="56" text-anchor="middle">AI活用度は1つの数字にまとめない</text>
  <text class="subtitle" x="480" y="84" text-anchor="middle">文章・工程・人間由来の価値を分けて見ることで、記事の作られ方を説明する</text>

  <g transform="translate(96 140)">
    <rect x="0" y="0" width="224" height="250" rx="8" fill="#f4ece5" stroke="#c7ad9d" stroke-width="2"/>
    <circle cx="112" cy="62" r="34" fill="#8f5d4a"/>
    <text class="badge" x="112" y="67" text-anchor="middle">文章</text>
    <text class="card-title" x="112" y="122" text-anchor="middle">AI文章残存率</text>
    <line class="soft-line" x1="34" y1="142" x2="190" y2="142"/>
    <text class="body" x="112" y="172" text-anchor="middle">AI下書きの文章が</text>
    <text class="body" x="112" y="195" text-anchor="middle">完成稿にどれだけ</text>
    <text class="body" x="112" y="218" text-anchor="middle">残っているか</text>
  </g>

  <g transform="translate(368 140)">
    <rect x="0" y="0" width="224" height="250" rx="8" fill="#e8f0ef" stroke="#8bb7b0" stroke-width="2"/>
    <circle cx="112" cy="62" r="34" fill="#3f7f7a"/>
    <text class="badge" x="112" y="67" text-anchor="middle">工程</text>
    <text class="card-title" x="112" y="122" text-anchor="middle">AI工程関与率</text>
    <line class="soft-line" x1="34" y1="142" x2="190" y2="142"/>
    <text class="body" x="112" y="172" text-anchor="middle">企画・構成・調査</text>
    <text class="body" x="112" y="195" text-anchor="middle">本文・推敲にAIが</text>
    <text class="body" x="112" y="218" text-anchor="middle">どれだけ関わったか</text>
  </g>

  <g transform="translate(640 140)">
    <rect x="0" y="0" width="224" height="250" rx="8" fill="#edf0df" stroke="#b4bf85" stroke-width="2"/>
    <circle cx="112" cy="62" r="34" fill="#6f7d35"/>
    <text class="badge" x="112" y="67" text-anchor="middle">価値</text>
    <text class="card-title" x="112" y="122" text-anchor="middle">人間独自価値率</text>
    <line class="soft-line" x1="34" y1="142" x2="190" y2="142"/>
    <text class="body" x="112" y="172" text-anchor="middle">実体験・実測・判断など</text>
    <text class="body" x="112" y="195" text-anchor="middle">人間由来の情報が</text>
    <text class="body" x="112" y="218" text-anchor="middle">どれだけあるか</text>
  </g>

  <path class="arrow" d="M320 260 C340 235 348 235 368 260"/>
  <path class="arrow" d="M592 260 C612 235 620 235 640 260"/>

  <g transform="translate(188 430)">
    <rect x="0" y="0" width="584" height="64" rx="8" fill="#ffffff" stroke="#ded2cc" stroke-width="1.5"/>
    <text class="body" x="292" y="27" text-anchor="middle">同じ記事でも、AIの文章が多く残ることと</text>
    <text class="body" x="292" y="49" text-anchor="middle">人間由来の価値が多いことは、同時に起こり得る</text>
  </g>
</svg>
